name: Advisory checks

# Non-blocking sweeps kept separate from CI on purpose: dependency
# vulnerabilities (govulncheck) and security static analysis (gosec) often
# surface findings you'll review and accept rather than fix, especially in a
# prototype. A red mark here is a heads-up, not a merge blocker — don't wire it
# into branch protection. The weekly run catches newly disclosed vulns in deps
# that haven't changed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  advisory:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: orchestrator/go.mod
          cache-dependency-path: orchestrator/go.sum

      - name: Cache Go tools
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('orchestrator/Makefile') }}

      - name: Install pinned tools
        run: make install-tools

      - name: govulncheck
        run: make vuln

      - name: gosec
        # Run even if govulncheck failed, so one report doesn't hide the other.
        if: always()
        run: make security
